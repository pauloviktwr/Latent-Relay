<div class="container main-container py-4">
  <a routerLink="/" class="main-header-link">
    <div class="main-header">Bridge Relay</div>
  </a>

  <div class="intro-text">
    <p>
      ARCHIVE AND DISCUSS DIGITAL TRACES, ENCODED SIGNALS, MAPS, AND SCHEMAS.
    </p>
  </div>

  <div class="row g-4 justify-content-center">
    @for (item of dataItems; track item.id) {
      <div class="col-12 col-md-10 col-lg-8">
        <div class="page-card">
          <img class="img-fluid" src="assets/data/adata.jpg" alt="Bridge Relay data">
          <p><strong>Título:</strong> {{ item.title }}</p>
          <p><strong>Detalhes:</strong> {{ item.details }}</p>
        </div>
      </div>
    } @empty {
      <div class="col-12 col-md-10 col-lg-8">
        <div class="page-card">
          <img class="img-fluid" src="assets/data/adata.jpg" alt="Bridge Relay data">
          <p>Carregando data ou nenhum registro disponível no momento.</p>
        </div>
      </div>
    }
  </div>
</div>
