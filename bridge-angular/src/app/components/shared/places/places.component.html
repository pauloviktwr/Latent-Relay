<div class="container main-container py-4">
  <a routerLink="/" class="main-header-link">
    <div class="main-header">Bridge Relay</div>
  </a>

  <div class="intro-text">
    <p>
      MAPS, OUTPOSTS, AND LOCATIONS WHERE STRANGE SIGNALS AND EVENTS WERE REPORTED.
    </p>
  </div>

  <div class="row g-4 justify-content-center">
    @for (item of placeItems; track item.id) {
      <div class="col-12 col-md-10 col-lg-8">
        <div class="page-card">
          <img class="img-fluid" src="assets/places/a.jpg" alt="Places">
          <p><strong>Local:</strong> {{ item.name }}</p>
          <p><strong>Região:</strong> {{ item.location }}</p>
          <p><strong>Descrição:</strong> {{ item.description }}</p>
        </div>
      </div>
    } @empty {
      <div class="col-12 col-md-10 col-lg-8">
        <div class="page-card">
          <img class="img-fluid" src="assets/places/a.jpg" alt="Places">
          <p>Carregando places ou nenhum registro disponível no momento.</p>
        </div>
      </div>
    }
  </div>
</div>
